<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自定义标题栏窗口</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      overflow: hidden;
    }
    .titlebar {
      height: 30px;
      background: #329ea3;
      user-select: none;
      display: flex;
      justify-content: flex-end;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10000;
    }
    .titlebar-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 100%;
      padding: 0 8px;
    }
    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      color: white;
      font-size: 12px;
      font-weight: 500;
    }
    .titlebar-buttons { display: flex; gap: 0; }
    .titlebar-button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 30px;
      height: 30px;
      user-select: none;
      cursor: pointer;
      color: white;
      transition: background-color 0.2s;
    }
    .titlebar-button:hover { background: #5bbec3; }
    .titlebar-button.close:hover { background: #e81123; }
    .content {
      padding-top: 30px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 50px 20px 20px;
    }
    h1 { font-size: 32px; margin-bottom: 16px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3); }
    p { font-size: 16px; margin-bottom: 8px; opacity: 0.9; }
    .features { margin-top: 30px; display: flex; flex-direction: column; gap: 12px; max-width: 500px; }
    .feature-item {
      background: rgba(255, 255, 255, 0.1);
      padding: 12px 16px;
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div class="titlebar" data-tauri-drag-region>
    <div class="titlebar-content" data-tauri-drag-region>
      <div class="titlebar-left" data-tauri-drag-region>
        <span data-tauri-drag-region>自定义标题栏窗口</span>
      </div>
      <div class="titlebar-buttons">
        <div class="titlebar-button" id="titlebar-minimize" title="最小化">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M0 6h12" stroke="currentColor" stroke-width="1" /></svg>
        </div>
        <div class="titlebar-button" id="titlebar-maximize" title="最大化">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="1" fill="none" /></svg>
        </div>
        <div class="titlebar-button close" id="titlebar-close" title="关闭">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1l-10 10" stroke="currentColor" stroke-width="1" /></svg>
        </div>
      </div>
    </div>
  </div>
  <div class="content">
    <h1>🎨 自定义标题栏</h1>
    <p>这是一个展示自定义标题栏的新窗口</p>
    <p>窗口没有系统默认的标题栏（decorations: false）</p>
    <div class="features">
      <div class="feature-item"><strong>✨ 自定义样式</strong> - 完全自定义的标题栏外观</div>
      <div class="feature-item"><strong>🖱️ 拖拽功能</strong> - 通过 data-tauri-drag-region 实现窗口拖拽</div>
      <div class="feature-item"><strong>🎛️ 窗口控制</strong> - 最小化、最大化、关闭按钮</div>
      <div class="feature-item"><strong>🎨 渐变背景</strong> - 美观的渐变背景效果</div>
    </div>
  </div>
  <script>
    // 使用全局 Tauri API 控制窗口
    (async () => {
      let isMaximized = false;
      let windowLabel = '';

      // 从 URL 参数获取窗口标签
      try {
        const urlParams = new URLSearchParams(window.location.search);
        windowLabel = urlParams.get('label') || 'custom-titlebar-1';
      } catch (error) {
        console.error('获取窗口标签失败:', error);
        windowLabel = 'custom-titlebar-1';
      }

      // 等待 Tauri API 加载
      function waitForTauri() {
        return new Promise((resolve) => {
          if (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke) {
            resolve(window.__TAURI__.core.invoke);
          } else {
            // 轮询等待
            const interval = setInterval(() => {
              if (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke) {
                clearInterval(interval);
                resolve(window.__TAURI__.core.invoke);
              }
            }, 100);
            // 超时处理
            setTimeout(() => {
              clearInterval(interval);
              resolve(null);
            }, 5000);
          }
        });
      }

      const invoke = await waitForTauri();
      if (!invoke) {
        console.error('无法加载 Tauri API');
        return;
      }

      function updateMaximizeIcon() {
        const icon = document.getElementById('titlebar-maximize')?.querySelector('svg');
        if (icon) {
          if (isMaximized) {
            icon.innerHTML = '<rect x="2" y="0" width="10" height="10" stroke="currentColor" stroke-width="1" fill="none" /><rect x="0" y="2" width="10" height="10" stroke="currentColor" stroke-width="1" fill="none" />';
          } else {
            icon.innerHTML = '<rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="1" fill="none" />';
          }
        }
      }

      // 绑定按钮事件
      document.getElementById('titlebar-minimize')?.addEventListener('click', async () => {
        try {
          await invoke('minimize_window', { windowLabel });
        } catch (error) {
          console.error('最小化窗口失败:', error);
        }
      });

      document.getElementById('titlebar-maximize')?.addEventListener('click', async () => {
        try {
          await invoke('toggle_maximize_window', { windowLabel });
          // 切换后更新图标
          isMaximized = !isMaximized;
          updateMaximizeIcon();
        } catch (error) {
          console.error('切换最大化失败:', error);
        }
      });

      document.getElementById('titlebar-close')?.addEventListener('click', async () => {
        try {
          await invoke('close_window', { windowLabel });
        } catch (error) {
          console.error('关闭窗口失败:', error);
        }
      });
    })();
  </script>
</body>
</html>
