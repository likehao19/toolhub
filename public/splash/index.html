<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: 0;
      padding: 0;
    }

    /* 背景动画粒子 */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.15);
      animation: float 10s infinite;
      clip-path: polygon(
        50% 0%,
        61% 35%,
        98% 35%,
        68% 57%,
        79% 91%,
        50% 70%,
        21% 91%,
        32% 57%,
        2% 35%,
        39% 35%
      );
    }

    .particle:nth-child(2n) {
      clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
    }

    .particle:nth-child(3n) {
      clip-path: polygon(50% 0%, 90% 20%, 100% 60%, 75% 100%, 25% 100%, 0% 60%, 10% 20%);
    }

    .particle:nth-child(4n) {
      clip-path: polygon(20% 0%, 80% 0%, 100% 50%, 80% 100%, 20% 100%, 0% 50%);
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) translateX(50px) rotate(360deg);
        opacity: 0;
      }
    }

    /* 主容器 */
    .splash-container {
      position: relative;
      z-index: 2;
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo 区域 */
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
      }
      50% {
        transform: scale(1.1);
        filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.8));
      }
    }

    .logo-icon {
      font-size: 64px;
      color: white;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    /* 应用名称 */
    .app-name {
      font-size: 32px;
      font-weight: bold;
      color: white;
      margin-bottom: 10px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
      letter-spacing: 1px;
    }

    /* 版本信息 */
    .version {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 40px;
    }

    /* 加载动画 */
    .loader-container {
      margin: 40px auto;
    }

    .spinner {
      width: 50px;
      height: 50px;
      margin: 0 auto 20px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 进度条 */
    .progress-bar {
      width: 300px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin: 0 auto 20px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #fff, rgba(255, 255, 255, 0.8));
      border-radius: 2px;
      width: 0%;
      animation: progress 2.5s ease-in-out infinite;
    }

    @keyframes progress {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    /* 加载文本 */
    .loading-text {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 5px;
    }

    .loading-status {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      min-height: 18px;
      animation: fadeInOut 1.5s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    /* 版权信息 */
    .copyright {
      position: absolute;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }
  </style>
</head>
<body>
  <!-- 背景粒子 -->
  <div class="particles" id="particles"></div>

  <!-- 主容器 -->
  <div class="splash-container">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">🚀</div>
    </div>

    <!-- 应用名称 -->
    <h1 class="app-name">Vue3 Tauri Desktop</h1>
    <div class="version">v0.1.0</div>

    <!-- 加载动画 -->
    <div class="loader-container">
      <div class="spinner"></div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <div class="loading-text">正在启动应用...</div>
      <div class="loading-status" id="status">初始化中</div>
    </div>
  </div>

  <!-- 版权信息 -->
  <div class="copyright">
    © 2025 Vue3 Tauri Template. All rights reserved.
  </div>

  <script>
    // 创建背景粒子
    function createParticles() {
      const container = document.getElementById('particles');
      const particleCount = 15;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';

        const size = Math.random() * 60 + 20;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.bottom = '-' + size + 'px';
        particle.style.animationDelay = Math.random() * 10 + 's';
        particle.style.animationDuration = (Math.random() * 5 + 8) + 's';

        container.appendChild(particle);
      }
    }

    // 更新加载状态
    const statuses = [
      '初始化中',
      '加载配置',
      '准备资源',
      '启动服务',
      '即将完成'
    ];

    let currentStatus = 0;
    function updateStatus() {
      const statusEl = document.getElementById('status');
      if (currentStatus < statuses.length) {
        statusEl.textContent = statuses[currentStatus];
        currentStatus++;
        setTimeout(updateStatus, 500);
      }
    }

    // 初始化
    window.addEventListener('DOMContentLoaded', () => {
      createParticles();
      setTimeout(updateStatus, 300);
    });

    // 监听来自主窗口的关闭信号
    window.addEventListener('message', (event) => {
      if (event.data === 'close-splash') {
        document.body.style.opacity = '0';
        document.body.style.transition = 'opacity 0.3s';
      }
    });
  </script>
</body>
</html>
