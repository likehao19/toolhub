<!DOCTYPE html>
<html lang="zh-CN" style="background:#eaf1fb;">
<head>
  <meta name="theme-color" content="#eaf1fb">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToolHub Loading</title>
  <style>
    :root {
      color-scheme: light;
      --bg-start: #eef4ff;
      --bg-end: #e7eef8;
      --card-bg: rgba(255, 255, 255, 0.72);
      --card-border: rgba(148, 163, 184, 0.16);
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-tertiary: #94a3b8;
      --accent: #4f7cff;
      --accent-soft: rgba(79, 124, 255, 0.14);
      --skeleton-base: rgba(148, 163, 184, 0.16);
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top left, rgba(79, 124, 255, 0.16), transparent 42%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.12), transparent 40%),
        linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
      color: var(--text-primary);
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.8;
    }

    body::before {
      width: 240px;
      height: 240px;
      top: -60px;
      left: -30px;
      background: rgba(79, 124, 255, 0.12);
    }

    body::after {
      width: 220px;
      height: 220px;
      right: -40px;
      bottom: -70px;
      background: rgba(56, 189, 248, 0.1);
    }

    main {
      display: block;
    }

    .splash-shell {
      position: relative;
      width: min(420px, calc(100vw - 48px));
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: var(--shadow);
      opacity: 1;
      transform: none;
    }

    @supports (backdrop-filter: blur(22px)) {
      .splash-shell {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        backdrop-filter: blur(22px);
      }
    }

    @supports not (backdrop-filter: blur(22px)) {
      .splash-shell {
        background: rgba(255, 255, 255, 0.94);
      }
    }

    .brand-row,
    .status-card,
    .footnote {
      opacity: 1;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .brand-logo {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: url('/logo.png') center/contain no-repeat;
      flex-shrink: 0;
      box-shadow: 0 14px 28px rgba(79, 124, 255, 0.22);
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }

    .brand-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .status-card {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.52);
    }

    .status-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .status-title::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 6px var(--accent-soft);
      flex-shrink: 0;
    }

    .status-text {
      min-height: 18px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      transition: opacity 160ms ease;
    }

    .skeleton-stack {
      display: grid;
      gap: 10px;
    }

    .skeleton-row {
      position: relative;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--skeleton-base);
    }

    .skeleton-row::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.1) 30%,
        rgba(255, 255, 255, 0.18) 50%,
        rgba(255, 255, 255, 0.1) 70%,
        transparent 100%
      );
    }

    .skeleton-row.wide { width: 100%; }
    .skeleton-row.mid { width: 76%; }
    .skeleton-row.short { width: 54%; }

    .footnote {
      margin-top: 16px;
      font-size: 11px;
      color: var(--text-tertiary);
      text-align: center;
      letter-spacing: 0.02em;
    }


  </style>
</head>
<body style="background:#eaf1fb;">
  <main class="splash-shell">
    <section class="brand-row">
      <div class="brand-logo" aria-hidden="true"></div>
      <div class="brand-copy">
        <h1 class="brand-title">ToolHub</h1>
        <p class="brand-subtitle">启动中，正在准备你的工作台与常用工具。</p>
      </div>
    </section>

    <section class="status-card">
      <div class="status-title">正在启动应用</div>
      <div class="status-text" id="status">初始化中</div>
      <div class="skeleton-stack" aria-hidden="true">
        <div class="skeleton-row wide"></div>
        <div class="skeleton-row mid"></div>
        <div class="skeleton-row short"></div>
      </div>
    </section>

    <div class="footnote">Loading workspace resources</div>
  </main>

  <script>
    const statuses = ['初始化中', '加载配置', '准备资源', '启动服务', '即将完成']
    let currentStatus = 0

    function updateStatus() {
      const statusEl = document.getElementById('status')
      if (statusEl && currentStatus < statuses.length) {
        statusEl.textContent = statuses[currentStatus]
        currentStatus += 1
        setTimeout(updateStatus, 520)
      }
    }

    function startSplashContent() {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          setTimeout(updateStatus, 120)
        })
      })
    }

    window.addEventListener('DOMContentLoaded', startSplashContent)
    window.addEventListener('splash-page-ready', startSplashContent)

    window.addEventListener('message', (event) => {
      if (event.data === 'close-splash') {
        document.body.style.opacity = '0'
        document.body.style.transition = 'opacity 0.22s ease'
      }
    })
  </script>
</body>
</html>
