name: Release

# 顶层声明：GITHUB_TOKEN 需要 contents:write 才能让 tauri-action 创建 Release。
# v1.0.5 时 GitHub 把默认 token 权限收紧为 read-only,仅靠 job-level permissions
# 不够,必须在 workflow 顶层 explicit 写出来才能覆盖 repo default。
permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14'           # ARM runner — Apple Silicon (M1/M2/M3+) 原生编译
            args: '--target aarch64-apple-darwin'
            rust_target: ''                # 用 host default (aarch64-apple-darwin)
          - platform: 'macos-14'           # 同样的 ARM runner,但交叉编译 x86_64 给 Intel Mac
            args: '--target x86_64-apple-darwin'
            rust_target: 'x86_64-apple-darwin'  # 必须显式装,host (ARM) 默认不带 x86_64
            # 为什么不用 macos-13 原生编 Intel:GitHub Actions Intel runner 长期排队 24h 超时,
            # ARM runner 性能强且资源充足,Apple 工具链原生支持 cross compile 到 x86_64。
          - platform: 'windows-latest'
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
        # rust_target 为空 → 只装 host target (ARM runner=aarch64, Windows=x86_64-pc-windows-msvc)
        # rust_target=x86_64-apple-darwin → 在 ARM host 上额外装 x86_64 toolchain 用于交叉编译

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Strip Windows-only resources for non-Windows builds
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          node -e "
          const fs = require('fs');
          const p = 'src-tauri/tauri.conf.json';
          const c = JSON.parse(fs.readFileSync(p, 'utf8'));
          if (c.bundle && c.bundle.resources) { delete c.bundle.resources; }
          fs.writeFileSync(p, JSON.stringify(c, null, 2));
          "

      - name: Ensure aria2c binary exists (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          if [ ! -f src-tauri/binaries/aria2c.exe ]; then
            echo "::warning::src-tauri/binaries/aria2c.exe missing — download manager will not work in this build"
          fi

      - name: Build & release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=6144'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ToolHub ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download this version and install.

            ## Downloads
            - **Windows**: `.msi` (WiX) or `.exe` (NSIS)
            - **macOS Apple Silicon (M1/M2/M3+)**: `aarch64.dmg`
            - **macOS Intel**: `x64.dmg`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
