name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14'           # ARM runner — native Apple Silicon build
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-13'           # Intel runner — native x86_64 build
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        # 不指定 targets：每个 runner 默认装 host target，刚好和 matrix args 一致

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Strip Windows-only resources for non-Windows builds
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          node -e "
          const fs = require('fs');
          const p = 'src-tauri/tauri.conf.json';
          const c = JSON.parse(fs.readFileSync(p, 'utf8'));
          if (c.bundle && c.bundle.resources) { delete c.bundle.resources; }
          fs.writeFileSync(p, JSON.stringify(c, null, 2));
          "

      - name: Ensure aria2c binary exists (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          if [ ! -f src-tauri/binaries/aria2c.exe ]; then
            echo "::warning::src-tauri/binaries/aria2c.exe missing — download manager will not work in this build"
          fi

      - name: Build & release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=6144'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ToolHub ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download this version and install.

            ## Downloads
            - **Windows**: `.msi` (WiX) or `.exe` (NSIS)
            - **macOS Apple Silicon (M1/M2/M3)**: `aarch64.dmg`
            - **macOS Intel**: `x64.dmg`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
