name: Release

# 顶层声明：GITHUB_TOKEN 需要 contents:write 才能让 tauri-action 创建 Release。
# v1.0.5 时 GitHub 把默认 token 权限收紧为 read-only,仅靠 job-level permissions
# 不够,必须在 workflow 顶层 explicit 写出来才能覆盖 repo default。
permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14'           # ARM runner — Apple Silicon (M1/M2/M3+)
            args: '--target aarch64-apple-darwin'
            # 不再构建 macos-13 (Intel)：GitHub Actions Intel runner 长期排队 24h 拿不到资源，
            # 且 Apple Silicon 自 2020 年起 5 年覆盖率高，Intel Mac 用户可用 Rosetta 2 跑 ARM 版。
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        # 不指定 targets：每个 runner 默认装 host target，刚好和 matrix args 一致

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Strip Windows-only resources for non-Windows builds
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          node -e "
          const fs = require('fs');
          const p = 'src-tauri/tauri.conf.json';
          const c = JSON.parse(fs.readFileSync(p, 'utf8'));
          if (c.bundle && c.bundle.resources) { delete c.bundle.resources; }
          fs.writeFileSync(p, JSON.stringify(c, null, 2));
          "

      - name: Ensure aria2c binary exists (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          if [ ! -f src-tauri/binaries/aria2c.exe ]; then
            echo "::warning::src-tauri/binaries/aria2c.exe missing — download manager will not work in this build"
          fi

      - name: Build & release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=6144'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ToolHub ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download this version and install.

            ## Downloads
            - **Windows**: `.msi` (WiX) or `.exe` (NSIS)
            - **macOS (Apple Silicon M1/M2/M3+)**: `aarch64.dmg`
            - **macOS Intel**: 请下载上面 Apple Silicon 版本，macOS 会通过 Rosetta 2 自动转译运行
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
