<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToolHub Loading</title>
  <style>
    :root {
      color-scheme: light;
      --bg-start: #eef4ff;
      --bg-end: #e7eef8;
      --card-bg: rgba(255, 255, 255, 0.72);
      --card-border: rgba(148, 163, 184, 0.16);
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-tertiary: #94a3b8;
      --accent: #4f7cff;
      --accent-soft: rgba(79, 124, 255, 0.14);
      --skeleton-base: rgba(148, 163, 184, 0.16);
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top left, rgba(79, 124, 255, 0.16), transparent 42%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.12), transparent 40%),
        linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
      color: var(--text-primary);
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(10px);
      opacity: 0.8;
    }

    body::before {
      width: 240px;
      height: 240px;
      top: -60px;
      left: -30px;
      background: rgba(79, 124, 255, 0.12);
      animation: floatBlob 8s ease-in-out infinite;
    }

    body::after {
      width: 220px;
      height: 220px;
      right: -40px;
      bottom: -70px;
      background: rgba(56, 189, 248, 0.1);
      animation: floatBlob 10s ease-in-out infinite reverse;
    }

    .splash-shell {
      position: relative;
      width: min(420px, calc(100vw - 48px));
      padding: 28px;
      border-radius: 28px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      animation: fadeUp 420ms ease-out;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .brand-logo {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, #5b8cff 0%, #60a5fa 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 28px rgba(79, 124, 255, 0.22);
      animation: pulse 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }

    .brand-logo::before {
      content: "";
      width: 22px;
      height: 22px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow:
        10px 0 0 -7px rgba(255, 255, 255, 0.92),
        -10px 0 0 -7px rgba(255, 255, 255, 0.92);
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }

    .brand-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .status-card {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.52);
    }

    .status-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .status-title::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 6px var(--accent-soft);
      animation: breathingDot 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    .status-text {
      min-height: 18px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      transition: opacity 160ms ease;
    }

    .skeleton-stack {
      display: grid;
      gap: 10px;
    }

    .skeleton-row {
      position: relative;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--skeleton-base);
    }

    .skeleton-row::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.14) 20%,
        rgba(255, 255, 255, 0.7) 50%,
        rgba(255, 255, 255, 0.14) 80%,
        transparent 100%
      );
      animation: shimmer 1.5s ease-in-out infinite;
    }

    .skeleton-row.wide { width: 100%; }
    .skeleton-row.mid { width: 76%; }
    .skeleton-row.short { width: 54%; }

    .footnote {
      margin-top: 16px;
      font-size: 11px;
      color: var(--text-tertiary);
      text-align: center;
      letter-spacing: 0.02em;
    }

    body[data-animation="minimal"] {
      --bg-start: #f5f7fb;
      --bg-end: #edf1f6;
      --card-bg: rgba(255, 255, 255, 0.82);
    }

    body[data-animation="wave"],
    body[data-animation="gradient"] {
      --bg-start: #e8efff;
      --bg-end: #e4ecfb;
    }

    body[data-animation="matrix"],
    body[data-animation="neon"],
    body[data-animation="space"] {
      --bg-start: #111827;
      --bg-end: #0f172a;
      --card-bg: rgba(15, 23, 42, 0.72);
      --card-border: rgba(148, 163, 184, 0.14);
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-tertiary: #94a3b8;
      --skeleton-base: rgba(148, 163, 184, 0.16);
      --shadow: 0 24px 60px rgba(2, 6, 23, 0.38);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.04);
      }
    }

    @keyframes shimmer {
      100% {
        transform: translateX(100%);
      }
    }

    @keyframes breathingDot {
      0%, 100% {
        transform: scale(0.95);
        opacity: 0.9;
      }
      50% {
        transform: scale(1.15);
        opacity: 1;
      }
    }

    @keyframes floatBlob {
      0%, 100% {
        transform: translate3d(0, 0, 0);
      }
      50% {
        transform: translate3d(12px, 10px, 0);
      }
    }
  </style>
</head>
<body>
  <main class="splash-shell">
    <section class="brand-row">
      <div class="brand-logo" aria-hidden="true"></div>
      <div class="brand-copy">
        <h1 class="brand-title">ToolHub</h1>
        <p class="brand-subtitle">启动中，正在准备你的工作台与常用工具。</p>
      </div>
    </section>

    <section class="status-card">
      <div class="status-title">正在启动应用</div>
      <div class="status-text" id="status">初始化中</div>
      <div class="skeleton-stack" aria-hidden="true">
        <div class="skeleton-row wide"></div>
        <div class="skeleton-row mid"></div>
        <div class="skeleton-row short"></div>
      </div>
    </section>

    <div class="footnote">Loading workspace resources</div>
  </main>

  <script>
    const statuses = ['初始化中', '加载配置', '准备资源', '启动服务', '即将完成']
    let currentStatus = 0

    function resolveAnimationType() {
      let animationType = 'default'
      try {
        const urlParams = new URLSearchParams(window.location.search)
        const urlAnim = urlParams.get('animation')
        if (urlAnim) {
          animationType = urlAnim
        } else {
          const savedAnim = localStorage.getItem('splashAnimation')
          if (savedAnim) animationType = savedAnim
        }
      } catch (_) {}
      return animationType
    }

    function applyAnimation(animType) {
      document.body.dataset.animation = animType || 'default'
      window.splashAnimationType = animType || 'default'
    }

    function updateStatus() {
      const statusEl = document.getElementById('status')
      if (statusEl && currentStatus < statuses.length) {
        statusEl.textContent = statuses[currentStatus]
        currentStatus += 1
        setTimeout(updateStatus, 520)
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      applyAnimation(resolveAnimationType())
      setTimeout(updateStatus, 240)
    })

    window.addEventListener('message', (event) => {
      if (event.data === 'close-splash') {
        document.body.style.opacity = '0'
        document.body.style.transition = 'opacity 0.22s ease'
      }
    })
  </script>
</body>
</html>
